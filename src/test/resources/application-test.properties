# ═══════════════════════════════════════════════════════════════
# Configuración para el perfil de test
# Se activa con @ActiveProfiles("test") en las clases de test
# ═══════════════════════════════════════════════════════════════

spring.application.name=biblioteca

# BD H2 separada para tests (no interfiere con la BD de desarrollo)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Desactivar Open EntityManager in View también en tests
spring.jpa.open-in-view=false
