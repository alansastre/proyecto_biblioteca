# ═══════════════════════════════════════════════════════════════
# Configuración de la aplicación Biblioteca - Spring Boot 4
# ═══════════════════════════════════════════════════════════════

# Nombre de la aplicación (aparece en logs y metricas)
spring.application.name=biblioteca

# ── Base de datos H2 en memoria ──────────────────────────────
# H2 es una BD Java embebida ideal para desarrollo: no requiere instalacion.
# "mem:" indica almacenamiento en memoria (se pierde al parar la aplicación).
spring.datasource.url=jdbc:h2:mem:biblioteca
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
# create-drop: crea las tablas al arrancar y las borra al parar.
# Opciones: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar las consultas SQL en la consola (util para depurar)
spring.jpa.show-sql=true

# Desactivar Open EntityManager in View (anti-patron en produccion).
# Fuerza a cargar datos LAZY dentro de la transaccion del servicio,
# lo que evita LazyInitializationException y sigue buenas practicas.
spring.jpa.open-in-view=false

# ── Consola H2 ──────────────────────────────────────────────
# Accesible en http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:biblioteca, User: sa, Password: (vacío)
spring.h2.console.enabled=true

# ── Thymeleaf ───────────────────────────────────────────────
# Desactivar cache para ver cambios en plantillas sin reiniciar (solo desarrollo)
spring.thymeleaf.cache=false
