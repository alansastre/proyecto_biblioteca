<!-- register.html — Registration form with Bean Validation and error display -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="surface-panel p-4 p-md-5">
                    <h1 class="mb-3">Registrarse</h1>
                    <p class="section-subtitle mb-4">Crea una cuenta para guardar tus favoritos, realizar compras y publicar reseñas.</p>

                    <!-- th:object vincula todo el formulario al objeto RegisterForm -->
                    <form th:action="@{/register}" th:object="${user}" method="post" data-testid="register-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <!-- th:field="*{username}" genera: name="username" id="username" value="..." -->
                            <input type="text" id="username" th:field="*{username}" class="form-control" required data-testid="register-username"/>
                            <!-- Muestra errores de validación del campo username -->
                            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></p>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" required data-testid="register-email"/>
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></p>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control" required data-testid="register-password"/>
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></p>
                        </div>

                        <div class="mb-3">
                            <label for="passwordConfirm" class="form-label">Confirmar contraseña</label>
                            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" class="form-control" required data-testid="register-password-confirm"/>
                            <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" class="text-danger"></p>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" data-testid="register-submit">Registrarse</button>
                    </form>
                    <p class="mt-3 mb-0"><a th:href="@{/login}">Ya tengo cuenta</a></p>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
