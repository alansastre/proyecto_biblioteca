<!-- login.html — Login form with error and logout parameter handling -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="surface-panel p-4 p-md-5">
                    <h1 class="mb-3">Iniciar sesión</h1>
                    <p class="section-subtitle mb-4">Inicia sesión para acceder a tus favoritos, compras y reseñas.</p>

                    <!-- Alerta de error: se muestra cuando Spring Security redirige a /login?error -->
                    <div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña incorrectos.</div>

                    <!-- Alerta de logout: se muestra cuando Spring Security redirige a /login?logout -->
                    <div th:if="${param.logout}" class="alert alert-success">Has cerrado sesión correctamente.</div>

                    <!-- Mensaje flash del registro exitoso -->
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                    <!-- Formulario de login: Spring Security intercepta el POST a /login -->
                    <form th:action="@{/login}" method="post" data-testid="login-form">
                        <!-- Token CSRF: proteccion contra Cross-Site Request Forgery -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input type="text" id="username" name="username" class="form-control" required autofocus data-testid="login-username"/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control" required data-testid="login-password"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" data-testid="login-submit">Entrar</button>
                    </form>
                    <p class="mt-3 mb-0"><a th:href="@{/register}">Crear cuenta</a></p>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
