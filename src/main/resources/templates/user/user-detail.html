<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${user.username}">Usuario</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-4">
        <section class="page-hero mb-4">
            <h1 class="mb-2" th:text="${user.username}">Usuario</h1>
            <p class="section-subtitle mb-0">Detalle del usuario, favoritos y compras.</p>
        </section>
        <div class="surface-panel p-4 mb-4">
            <dl class="row mb-0">
                <dt class="col-sm-2">Email</dt><dd class="col-sm-10" th:text="${user.email}"></dd>
                <dt class="col-sm-2">Rol</dt><dd class="col-sm-10" th:text="${user.role}"></dd>
            </dl>
        </div>
        <h2>Favoritos</h2>
        <ul class="list-group mb-4">
            <li class="list-group-item" th:each="b : ${favorites}"><a th:href="@{/books/{id}(id=${b.id})}" th:text="${b.title}"></a></li>
            <li class="list-group-item text-muted" th:if="${#lists.isEmpty(favorites)}">Este usuario no tiene favoritos.</li>
        </ul>
        <h2>Compras</h2>
        <ul class="list-group">
            <li class="list-group-item" th:each="p : ${purchases}"><a th:href="@{/books/{id}(id=${p.book.id})}" th:text="|${p.book.title} - ${#temporals.format(p.purchasedAt, 'dd/MM/yyyy')}|"></a></li>
            <li class="list-group-item text-muted" th:if="${#lists.isEmpty(purchases)}">Este usuario no tiene compras.</li>
        </ul>
        <p><a th:href="@{/users}">Volver a usuarios</a></p>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
