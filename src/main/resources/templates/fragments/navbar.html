<!-- navbar.html — Navigation bar with Spring Security authorization -->
<th:block th:fragment="navbar" xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <style>
        :root {
            --app-bg: #f4f7fb;
            --app-surface: #ffffff;
            --app-border: rgba(15, 23, 42, 0.08);
            --app-primary: #2563eb;
            --app-primary-dark: #4338ca;
            --app-text: #0f172a;
            --app-muted: #475569;
        }

        body {
            min-height: 100vh;
            background:
                    radial-gradient(circle at top, rgba(191, 219, 254, 0.45) 0%, rgba(244, 247, 251, 0) 30%),
                    linear-gradient(180deg, #f8fbff 0%, var(--app-bg) 100%);
            color: var(--app-text);
        }

        main.container {
            max-width: 1140px;
        }

        .app-navbar {
            background: linear-gradient(135deg, var(--app-primary) 0%, var(--app-primary-dark) 100%);
            box-shadow: 0 18px 45px rgba(37, 99, 235, 0.24);
        }

        .app-navbar .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .app-navbar .nav-link,
        .app-navbar .navbar-text {
            color: rgba(255, 255, 255, 0.92) !important;
        }

        .app-navbar .nav-link:hover,
        .app-navbar .nav-link:focus {
            color: #ffffff !important;
        }

        h1,
        h2,
        h3 {
            color: var(--app-text);
            font-weight: 700;
        }

        .page-hero,
        .card,
        .table,
        .list-group,
        .alert,
        .surface-panel {
            border: 1px solid var(--app-border);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.07);
        }

        .page-hero,
        .card,
        .alert,
        .surface-panel,
        .list-group {
            border-radius: 1.25rem;
            background: var(--app-surface);
        }

        .card {
            overflow: hidden;
        }

        .table {
            overflow: hidden;
            border-radius: 1rem;
            background: var(--app-surface);
        }

        .table thead th {
            background: #f8fafc;
            color: #334155;
            font-weight: 600;
            border-bottom: 0;
        }

        .list-group-item {
            border: 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .list-group-item:last-child {
            border-bottom: 0;
        }

        .btn {
            border-radius: 0.9rem;
            font-weight: 600;
        }

        .btn-primary {
            border: 0;
            background: linear-gradient(135deg, var(--app-primary) 0%, var(--app-primary-dark) 100%);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #1d4ed8 0%, #3730a3 100%);
        }

        .form-control,
        .form-select,
        .form-control-plaintext {
            border-radius: 0.9rem;
            border: 1px solid #d7deea;
            background-color: var(--app-surface);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.15);
        }

        .section-subtitle {
            max-width: 56rem;
            color: var(--app-muted);
        }

        .page-hero {
            padding: 2rem;
            background:
                    linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(67, 56, 202, 0.12) 100%),
                    var(--app-surface);
        }

        .page-flash {
            margin-top: 1rem;
        }
    </style>

    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}" data-testid="nav-home-brand">Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}" data-testid="nav-home">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/books}" data-testid="nav-books">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/authors}" data-testid="nav-authors">Autores</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/categories}" data-testid="nav-categories">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reviews}" data-testid="nav-reviews">Reviews</a></li>
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <a class="nav-link" th:href="@{/user/profile}" data-testid="nav-profile">Mi perfil</a>
                    </li>
                    <li class="nav-item" th:if="${isAdmin}">
                        <a class="nav-link" th:href="@{/users}" data-testid="nav-users">Usuarios</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" th:if="${!isAuthenticated}">
                        <a class="nav-link" th:href="@{/login}" data-testid="nav-login">Iniciar sesión</a>
                    </li>
                    <li class="nav-item" th:if="${!isAuthenticated}">
                        <a class="nav-link" th:href="@{/register}" data-testid="nav-register">Registrarse</a>
                    </li>
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <span class="navbar-text me-2" th:text="${currentUsername}"></span>
                    </li>
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-light btn-sm" data-testid="logout-btn">Cerrar sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container page-flash" th:if="${message}">
        <div class="alert alert-success alert-dismissible fade show" role="alert" data-testid="flash-message">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
    </div>
</th:block>
