<!-- book-form.html — Create/edit book form with author and category selection -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${book.id != null} ? 'Editar libro' : 'Nuevo libro'">Libro</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-4">
        <div class="surface-panel p-4">
            <!-- Título dinámico: cambia según sea creación o edición -->
            <h1 th:text="${book.id != null} ? 'Editar libro' : 'Nuevo libro'">Formulario libro</h1>

            <!-- th:action="@{${formAction}}": URL dinámica, th:object="${book}": objeto vinculado -->
            <form th:action="@{${formAction}}" th:object="${book}" method="post" data-testid="book-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="title" class="form-label">Título</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required/>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger"></p>
                </div>

                <!-- Select de autor: th:field="*{author.id}" vincula al ID de la relacion ManyToOne -->
                <div class="mb-3">
                    <label for="author" class="form-label">Autor</label>
                    <select id="author" th:field="*{author.id}" class="form-select" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Precio</label>
                    <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control"/>
                </div>
                <div class="mb-3">
                    <label for="isbn" class="form-label">ISBN</label>
                    <input type="text" id="isbn" th:field="*{isbn}" class="form-control"/>
                </div>
                <div class="mb-3">
                    <label for="pages" class="form-label">Páginas</label>
                    <input type="number" id="pages" th:field="*{pages}" class="form-control"/>
                </div>
                <div class="mb-3">
                    <label for="language" class="form-label">Idioma</label>
                    <input type="text" id="language" th:field="*{language}" class="form-control"/>
                </div>
                <div class="mb-3">
                    <label for="synopsis" class="form-label">Sinopsis</label>
                    <textarea id="synopsis" th:field="*{synopsis}" class="form-control" rows="3"></textarea>
                </div>

                <!-- Select múltiple para categorías (ManyToMany) -->
                <!-- Category selection -->
                <div class="mb-3">
                    <label class="form-label">Categorías</label>
                    <select name="categoryIds" class="form-select" múltiple>
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                th:selected="${selectedCategoryIds != null && selectedCategoryIds.contains(c.id)}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/books}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
