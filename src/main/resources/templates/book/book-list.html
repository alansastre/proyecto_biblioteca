<!-- book-list.html — Book catalog with title, author, category and price filters -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Libros</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-4">
        <section class="page-hero mb-4">
            <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-end">
                <div>
                    <h1 class="mb-2">Libros</h1>
                    <p class="section-subtitle mb-0">Busca y filtra libros por título, autor, categoría o precio.</p>
                </div>
                <p class="mb-0 text-muted" th:text="|${#lists.size(books)} resultados|">0 resultados</p>
            </div>
        </section>

        <!-- Formulario de filtros: usa method="get" para que los filtros aparezcan en la URL -->
        <form method="get" class="row g-2 mb-3">
            <div class="col-auto">
                <input type="text" name="title" th:value="${param.title}" class="form-control" placeholder="Título"/>
            </div>
            <div class="col-auto">
                <!-- Author filter -->
                <select name="authorId" class="form-select">
                    <option value="">-- Autor --</option>
                    <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"
                            th:selected="${param.authorId != null && param.authorId[0] == a.id.toString()}"></option>
                </select>
            </div>
            <div class="col-auto">
                <select name="categoryId" class="form-select">
                    <option value="">-- Categoría --</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${param.categoryId != null && param.categoryId[0] == c.id.toString()}"></option>
                </select>
            </div>
            <div class="col-auto"><button type="submit" class="btn btn-secondary">Filtrar</button></div>
        </form>

        <!-- Botón de crear: solo visible para ADMIN -->
        <p th:if="${isAdmin}"><a th:href="@{/books/create}" class="btn btn-primary">Nuevo libro</a></p>

        <!-- Grid de cards: th:each genera una card por cada libro -->
        <div class="row g-3" data-testid="book-cards">
            <div class="col-md-4" th:each="b : ${books}">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><a th:href="@{/books/{id}(id=${b.id})}" th:text="${b.title}"></a></h5>
                        <p class="card-text" th:text="${b.author != null ? b.author.name : 'Sin autor'}"></p>
                        <p class="card-text"><strong th:text="${b.price != null ? b.price + ' EUR' : '-'}"></strong></p>
                        <a th:href="@{/books/{id}(id=${b.id})}" class="btn btn-sm btn-primary">Ver</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="surface-panel p-4 text-center text-muted" th:if="${#lists.isEmpty(books)}">
            No hay libros para los filtros seleccionados.
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
