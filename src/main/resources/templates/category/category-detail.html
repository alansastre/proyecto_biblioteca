<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${category.name}">Categoría</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-4">
        <section class="page-hero mb-4">
            <h1 class="mb-2" th:text="${category.name}">Categoría</h1>
            <p class="section-subtitle mb-0" th:text="${category.description}"></p>
        </section>
        <h2>Libros</h2>
        <ul class="list-group mb-4">
            <li class="list-group-item" th:each="b : ${category.books}"><a th:href="@{/books/{id}(id=${b.id})}" th:text="${b.title}"></a></li>
            <li class="list-group-item text-muted" th:if="${#lists.isEmpty(category.books)}">No hay libros asociados a esta categoría.</li>
        </ul>
        <div class="d-flex gap-2 flex-wrap" th:if="${isAdmin}">
            <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-secondary">Editar</a>
            <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Eliminar</button>
            </form>
        </div>
        <p><a th:href="@{/categories}">Volver a categorías</a></p>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
