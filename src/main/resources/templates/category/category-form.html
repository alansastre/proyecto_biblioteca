<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${category.id != null} ? 'Editar categoría' : 'Nueva categoría'">Categoría</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container my-4">
        <div class="surface-panel p-4">
            <h1 th:text="${category.id != null} ? 'Editar categoría' : 'Nueva categoría'">Formulario categoría</h1>
            <form th:action="@{${formAction}}" th:object="${category}" method="post" data-testid="category-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label for="name" class="form-label">Nombre</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></p>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Descripción</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label for="color" class="form-label">Color</label>
                    <input type="text" id="color" th:field="*{color}" class="form-control" placeholder="#3498db"/>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/categories}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
